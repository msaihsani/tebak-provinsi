<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <title>Tebak Provinsi Gacor v3</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://unpkg.com/topojson-client@3"></script>
    <style>
        :root {
            --bg-color: #1a1a2e;
            --card-bg: #16213e;
            --accent-color: #00d2ff;
            --correct-color: #4dfdcb;
            --wrong-color: #ff4d4d;
            --base-prov-color: #445577;
            --text-color: #ffffff;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            text-align: center;
            width: 950px;
            position: relative;
        }

        #soal {
            font-size: 1.8rem;
            margin: 15px 0;
            min-height: 80px; /* Ditinggikan sedikit agar muat 2 baris teks */
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            transition: color 0.3s;
        }

        .text-wrong {
            color: var(--wrong-color) !important;
            animation: shake 0.5s;
        }

        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            50% { transform: translateX(10px); }
            75% { transform: translateX(-10px); }
            100% { transform: translateX(0); }
        }

        .btn-restart {
            background: var(--accent-color);
            color: var(--bg-color);
            border: none;
            padding: 10px 25px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn-restart:hover {
            transform: scale(1.1);
            box-shadow: 0 0 15px var(--accent-color);
        }

        svg {
            background: #0f3460;
            border-radius: 15px;
            margin-top: 10px;
        }

        path {
            cursor: pointer;
            transition: fill 0.3s;
        }

        path.unanswered:hover {
            filter: brightness(1.5);
            stroke: var(--accent-color);
            stroke-width: 1.5px;
        }

        path.answered {
            cursor: default;
            pointer-events: none;
        }

        .progress-bar {
            width: 100%;
            height: 12px;
            background: #0f3460;
            border-radius: 6px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        #progress-inner {
            height: 100%;
            width: 0%;
            background: var(--correct-color);
            transition: width 0.4s ease;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2 style="color: var(--accent-color); letter-spacing: 3px; margin: 0;">PETA INDONESIA</h2>
        
        <div class="progress-bar">
            <div id="progress-inner"></div>
        </div>
        <div id="stats">Progres: 0 / 38</div>

        <div id="soal">Memuat Peta...</div>

        <svg width="900" height="500"></svg>
    </div>

<script>
const width = 900;
const height = 500;
const svg = d3.select("svg");
const soalEl = document.getElementById("soal");
const statsEl = document.getElementById("stats");
const progressEl = document.getElementById("progress-inner");

let provinces = [];
let sisaProvinsi = [];
let currentProv = null;
let isLockout = false; // Mencegah klik saat animasi salah berlangsung

d3.json("indonesia-38-provinces.topo.json").then(function(data){
    const objectName = Object.keys(data.objects)[0];
    const geojson = topojson.feature(data, data.objects[objectName]);
    provinces = geojson.features;

    const projection = d3.geoMercator().fitSize([width, height], geojson);
    const pathGenerator = d3.geoPath().projection(projection);

    svg.selectAll("path")
        .data(provinces)
        .enter()
        .append("path")
        .attr("d", pathGenerator)
        .attr("stroke", "#1a1a2e")
        .attr("stroke-width", "0.5")
        .attr("class", "unanswered")
        .on("click", handlePathClick);

    resetGame();
});

function handlePathClick(event, d) {
    if(!currentProv || isLockout) return;

    if(d.properties.PROVINSI === currentProv.properties.PROVINSI){
        // BENAR
        d3.select(this)
            .attr("class", "answered")
            .transition()
            .attr("fill", "var(--correct-color)");

        sisaProvinsi = sisaProvinsi.filter(p => 
            p.properties.PROVINSI !== currentProv.properties.PROVINSI
        );

        ambilSoalBaru();
    } else {
        // SALAH - Feedback langsung di Game
        isLockout = true;
        
        // Flash warna merah di provinsi yang salah diklik
        d3.select(this)
            .transition().duration(100)
            .attr("fill", "var(--wrong-color)")
            .transition().duration(500)
            .attr("fill", "var(--base-prov-color)");

        // Ubah teks soal jadi peringatan
        soalEl.classList.add("text-wrong");
        soalEl.innerHTML = `<div>SALAH! Itu adalah <b style="text-decoration:underline">${d.properties.PROVINSI}</b></div>
                            <div style="font-size: 1rem; margin-top: 5px;">Mengulang dari awal...</div>`;

        // Tunggu 1.5 detik lalu reset
        setTimeout(() => {
            soalEl.classList.remove("text-wrong");
            isLockout = false;
            resetGame();
        }, 1500);
    }
}

function ambilSoalBaru(){
    const total = provinces.length;
    const terjawab = total - sisaProvinsi.length;
    
    statsEl.innerText = `Progres: ${terjawab} / ${total}`;
    progressEl.style.width = (terjawab / total * 100) + "%";

    if(sisaProvinsi.length === 0){
        soalEl.innerHTML = `<div>🎉 SEMUA PROVINSI DITEMUKAN!</div>
                            <button class="btn-restart" onclick="resetGame()">Main Lagi</button>`;
        currentProv = null;
        return;
    }

    const randomIndex = Math.floor(Math.random() * sisaProvinsi.length);
    currentProv = sisaProvinsi[randomIndex];
    soalEl.innerHTML = `Mana provinsi <span style="color: var(--accent-color)">${currentProv.properties.PROVINSI}</span>?`;
}

function resetGame(){
    sisaProvinsi = [...provinces];
    svg.selectAll("path")
        .attr("class", "unanswered")
        .transition().duration(500)
        .attr("fill", "var(--base-prov-color)");
    
    ambilSoalBaru();
}
</script>

</body>
</html>
