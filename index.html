<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <title>Tebak Provinsi Gacor v2</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://unpkg.com/topojson-client@3"></script>
    <style>
        :root {
            --bg-color: #1a1a2e;
            --card-bg: #16213e;
            --accent-color: #00d2ff;
            --correct-color: #4dfdcb;
            --wrong-color: #e94560;
            --base-prov-color: #445577; /* Warna lebih terang agar tidak gelap */
            --text-color: #ffffff;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            text-align: center;
            width: 950px;
        }

        #soal {
            font-size: 1.8rem;
            margin: 15px 0;
            min-height: 45px;
        }

        /* Tombol Restart Gacor */
        .btn-restart {
            background: var(--accent-color);
            color: var(--bg-color);
            border: none;
            padding: 10px 25px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn-restart:hover {
            transform: scale(1.1);
            box-shadow: 0 0 15px var(--accent-color);
        }

        svg {
            background: #0f3460;
            border-radius: 15px;
            margin-top: 20px;
        }

        /* State Provinsi */
        path {
            cursor: pointer;
            transition: fill 0.3s;
        }

        path.unanswered:hover {
            filter: brightness(1.5);
            stroke: var(--accent-color);
            stroke-width: 1.5px;
        }

        path.answered {
            cursor: default; /* Kursor biasa untuk yang sudah dijawab */
            pointer-events: none; /* Mengunci agar tidak bisa diklik lagi */
        }

        .progress-bar {
            width: 100%;
            height: 12px;
            background: #0f3460;
            border-radius: 6px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        #progress-inner {
            height: 100%;
            width: 0%;
            background: var(--correct-color);
            transition: width 0.4s ease;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2 style="color: var(--accent-color); letter-spacing: 3px;">PETA INDONESIA</h2>
        
        <div class="progress-bar">
            <div id="progress-inner"></div>
        </div>
        <div id="stats">Progres: 0 / 38</div>

        <div id="soal">Memuat Peta...</div>

        <div style="position: relative;">
            <svg width="900" height="500"></svg>
        </div>
    </div>

<script>
const width = 900;
const height = 500;
const svg = d3.select("svg");
const soalEl = document.getElementById("soal");
const statsEl = document.getElementById("stats");
const progressEl = document.getElementById("progress-inner");

let provinces = [];
let sisaProvinsi = [];
let currentProv = null;

d3.json("indonesia-38-provinces.topo.json").then(function(data){
    const objectName = Object.keys(data.objects)[0];
    const geojson = topojson.feature(data, data.objects[objectName]);
    provinces = geojson.features;

    const projection = d3.geoMercator().fitSize([width, height], geojson);
    const pathGenerator = d3.geoPath().projection(projection);

    // Render Peta Awal
    svg.selectAll("path")
        .data(provinces)
        .enter()
        .append("path")
        .attr("d", pathGenerator)
        .attr("stroke", "#1a1a2e")
        .attr("stroke-width", "0.5")
        .attr("class", "unanswered") // Default semua belum dijawab
        .on("click", handlePathClick);

    resetGame();
});

function handlePathClick(event, d) {
    if(!currentProv) return;

    // Cek jawaban
    if(d.properties.PROVINSI === currentProv.properties.PROVINSI){
        // JAWABAN BENAR
        d3.select(this)
            .attr("class", "answered") // KUNCI PROVINSI INI
            .transition()
            .attr("fill", "var(--correct-color)");

        sisaProvinsi = sisaProvinsi.filter(p => 
            p.properties.PROVINSI !== currentProv.properties.PROVINSI
        );

        ambilSoalBaru();
    } else {
        // JAWABAN SALAH
        alert("Salah! 💀 Itu adalah " + d.properties.PROVINSI + ". Ulangi lagi!");
        resetGame();
    }
}

function ambilSoalBaru(){
    const total = provinces.length;
    const terjawab = total - sisaProvinsi.length;
    
    // Update Stats & Progress
    statsEl.innerText = `Progres: ${terjawab} / ${total}`;
    progressEl.style.width = (terjawab / total * 100) + "%";

    if(sisaProvinsi.length === 0){
        soalEl.innerHTML = `<div>🎉 SEMUA PROVINSI DITEMUKAN!</div>
                            <button class="btn-restart" onclick="resetGame()">Main Lagi</button>`;
        currentProv = null;
        return;
    }

    const randomIndex = Math.floor(Math.random() * sisaProvinsi.length);
    currentProv = sisaProvinsi[randomIndex];
    soalEl.innerHTML = `Mana provinsi <span style="color: var(--accent-color)">${currentProv.properties.PROVINSI}</span>?`;
}

function resetGame(){
    sisaProvinsi = [...provinces];
    // Reset visual peta
    svg.selectAll("path")
        .attr("class", "unanswered") // Buka kunci semua
        .transition().duration(500)
        .attr("fill", "var(--base-prov-color)"); // Warna dasar yang lebih terang
    
    ambilSoalBaru();
}
</script>

</body>
</html>
