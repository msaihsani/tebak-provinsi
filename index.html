<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Tebak Provinsi</title>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://unpkg.com/topojson-client@3"></script>

<style>
body {
  font-family: Arial;
  text-align: center;
}

svg {
  border: 1px solid #ccc;
}
</style>

</head>
<body>

<h2>Tebak Provinsi Indonesia</h2>
<p id="soal">Loading...</p>

<svg width="900" height="600"></svg>

<script>
const width = 900;
const height = 600;
const svg = d3.select("svg");

d3.json("indonesia-38-provinces.topo.json")
.then(function(data){

  const objectName = Object.keys(data.objects)[0];
  const geojson = topojson.feature(data, data.objects[objectName]);
  const provinces = geojson.features;

  const projection = d3.geoMercator()
      .fitSize([width, height], geojson);

  const path = d3.geoPath().projection(projection);

  let sisaProvinsi = [...provinces];   // daftar yg belum dijawab
  let currentProv = null;

  function ambilSoalBaru(){
      if(sisaProvinsi.length === 0){
          document.getElementById("soal").innerText = 
              "🎉 Semua provinsi selesai!";
          return;
      }

      const randomIndex = Math.floor(Math.random() * sisaProvinsi.length);
      currentProv = sisaProvinsi[randomIndex];

      document.getElementById("soal").innerText =
          "Klik provinsi: " + currentProv.properties.PROVINSI;
  }

  function resetGame(){
      sisaProvinsi = [...provinces];
      svg.selectAll("path").attr("fill", "#dcdcdc");
      ambilSoalBaru();
  }

  svg.selectAll("path")
    .data(provinces)
    .enter()
    .append("path")
    .attr("d", path)
    .attr("fill", "#dcdcdc")
    .attr("stroke", "#333")
    .on("click", function(event, d){

        if(!currentProv) return;

        if(d.properties.PROVINSI === currentProv.properties.PROVINSI){

            d3.select(this).attr("fill", "green");

            // hapus dari daftar soal
            sisaProvinsi = sisaProvinsi.filter(p =>
                p.properties.PROVINSI !== currentProv.properties.PROVINSI
            );

            ambilSoalBaru();

        } else {
            alert("Salah 😅 Ulang dari awal!");
            resetGame();
        }

    });

  ambilSoalBaru();

})
.catch(function(error){
  console.error("ERROR JSON:", error);
});
</script>

</body>
</html>
