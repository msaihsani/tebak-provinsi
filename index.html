<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Tebak Provinsi</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="https://unpkg.com/topojson-client@3"></script>
</head>
<body>

<h2>Tebak Provinsi Indonesia</h2>
<p id="soal"></p>

<svg width="800" height="600"></svg>

<script>
const width = 800;
const height = 600;

const svg = d3.select("svg");
const projection = d3.geoMercator()
    .scale(1000)
    .translate([width / 2, height / 2]);

const path = d3.geoPath().projection(projection);

d3.json("indonesia-38-provinces.topo.json").then(function(data) {

  const objectName = Object.keys(data.objects)[0];
  const provinces = topojson.feature(data, data.objects[objectName]).features;

  const randomProv = provinces[Math.floor(Math.random() * provinces.length)];
  document.getElementById("soal").innerText =
      "Klik provinsi: " + randomProv.properties.PROVINSI;

  svg.selectAll("path")
    .data(provinces)
    .enter()
    .append("path")
    .attr("d", path)
    .attr("fill", "#ccc")
    .attr("stroke", "#333")
    .on("click", function(event, d) {
        if(d.properties.PROVINSI === randomProv.properties.PROVINSI){
            alert("Benar! 🎉");
            d3.select(this).attr("fill", "green");
        } else {
            alert("Salah 😅");
        }
    });

});
</script>

</body>
</html>
