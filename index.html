<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Tebak Provinsi</title>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://unpkg.com/topojson-client@3"></script>

<style>
body {
  font-family: Arial;
  text-align: center;
}

svg {
  border: 1px solid #ccc;
}
</style>

</head>
<body>

<h2>Tebak Provinsi Indonesia</h2>
<p id="soal">Loading...</p>

<svg width="900" height="600"></svg>

<script>
const width = 900;
const height = 600;
const svg = d3.select("svg");

d3.json("indonesia-38-provinces.topo.json")
.then(function(data){

  const objectName = Object.keys(data.objects)[0];
  const geojson = topojson.feature(data, data.objects[objectName]);
  const provinces = geojson.features;

  const projection = d3.geoMercator()
      .fitSize([width, height], geojson);

  const path = d3.geoPath().projection(projection);

  const randomProv = provinces[Math.floor(Math.random()*provinces.length)];
  document.getElementById("soal").innerText =
      "Klik provinsi: " + randomProv.properties.PROVINSI;

  svg.selectAll("path")
    .data(provinces)
    .enter()
    .append("path")
    .attr("d", path)
    .attr("fill", "#dcdcdc")
    .attr("stroke", "#333")
    .on("click", function(event, d){
        if(d.properties.PROVINSI === randomProv.properties.PROVINSI){
            alert("Benar! 🎉");
            d3.select(this).attr("fill", "green");
        } else {
            alert("Salah 😅");
        }
    });

})
.catch(function(error){
  console.error("ERROR JSON:", error);
});
</script>

</body>
</html>
